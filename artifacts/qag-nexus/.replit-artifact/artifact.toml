kind = "web"
previewPath = "/"
title = "QAG Nexus — Quantum Affinity Gravity"
version = "1.0.0"
id = "artifacts/qag-nexus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23075
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/qag-nexus run dev"

[services.env]
PORT = "23075"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/qag-nexus", "run", "build"]
publicDir = "artifacts/qag-nexus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
